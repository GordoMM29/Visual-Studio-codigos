<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Eventos</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --danger-color: #e74c3c;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background-color: var(--dark-color);
            color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-role {
            background-color: var(--primary-color);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .calendar-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 20px;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--primary-color);
            color: white;
        }
        
        .calendar-nav button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        .calendar-nav button:hover {
            background-color: rgba(255,255,255,0.2);
        }
        
        .calendar-view-options {
            display: flex;
            gap: 10px;
        }
        
        .calendar-view-options button {
            background-color: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .calendar-view-options button.active {
            background-color: white;
            color: var(--primary-color);
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: #ddd;
        }
        
        .calendar-day-header {
            background-color: var(--dark-color);
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }
        
        .calendar-day {
            background-color: white;
            min-height: 120px;
            padding: 8px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .calendar-day:hover {
            background-color: #f9f9f9;
        }
        
        .calendar-day.other-month {
            background-color: #f5f5f5;
            color: #aaa;
        }
        
        .day-number {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .event {
            background-color: var(--secondary-color);
            color: white;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 3px;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .event.registered {
            background-color: var(--primary-color);
        }
        
        .event.full {
            background-color: var(--danger-color);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #777;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }
        
        .btn-success {
            background-color: var(--secondary-color);
            color: white;
        }
        
        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .event-details {
            margin-bottom: 20px;
        }
        
        .event-details p {
            margin-bottom: 10px;
        }
        
        .event-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .admin-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            z-index: 1100;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
        }
        
        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .notification.success {
            background-color: var(--secondary-color);
        }
        
        .notification.error {
            background-color: var(--danger-color);
        }
        
        @media (max-width: 768px) {
            .calendar-day {
                min-height: 80px;
            }
            
            .event {
                font-size: 0.7rem;
                padding: 2px 4px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Calendario de Eventos</h1>
            <div class="user-info">
                <span id="user-name">Usuario Ejemplo</span>
                <span id="user-role" class="user-role">Administrador</span>
                <button id="logout-btn" class="btn btn-secondary">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="admin-controls" class="admin-controls">
            <button id="add-event-btn" class="btn btn-primary">Agregar Evento</button>
        </div>

        <div class="calendar-container">
            <div class="calendar-header">
                <div class="calendar-nav">
                    <button id="prev-month">&lt;</button>
                </div>
                <h2 id="current-month">Mes Año</h2>
                <div class="calendar-nav">
                    <button id="next-month">&gt;</button>
                </div>
            </div>
            
            <div class="calendar-view-options">
                <button class="active" data-view="month">Mes</button>
                <button data-view="week">Semana</button>
                <button data-view="day">Día</button>
            </div>
            
            <div class="calendar-grid" id="calendar-grid">
                <!-- Los días se generarán dinámicamente con JavaScript -->
            </div>
        </div>
    </div>

    <!-- Modal para agregar/editar evento -->
    <div id="event-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Agregar Evento</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="event-form">
                <div class="form-group">
                    <label for="event-title">Título del Evento</label>
                    <input type="text" id="event-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="event-description">Descripción</label>
                    <textarea id="event-description" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="event-date">Fecha</label>
                    <input type="date" id="event-date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="event-time">Hora</label>
                    <input type="time" id="event-time" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="event-duration">Duración (minutos)</label>
                    <input type="number" id="event-duration" class="form-control" value="60" min="1">
                </div>
                <div class="form-group">
                    <label for="event-capacity">Capacidad máxima</label>
                    <input type="number" id="event-capacity" class="form-control" value="20" min="1">
                </div>
                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary close-modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="save-event-btn">Guardar Evento</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal para ver detalles del evento -->
    <div id="event-details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="event-details-title">Detalles del Evento</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="event-details">
                <p><strong>Descripción:</strong> <span id="event-details-description"></span></p>
                <p><strong>Fecha:</strong> <span id="event-details-date"></span></p>
                <p><strong>Hora:</strong> <span id="event-details-time"></span></p>
                <p><strong>Duración:</strong> <span id="event-details-duration"></span> minutos</p>
                <p><strong>Capacidad:</strong> <span id="event-details-capacity"></span> personas</p>
                <p><strong>Inscritos:</strong> <span id="event-details-registered"></span> personas</p>
            </div>
            <div class="event-actions" id="event-actions">
                <!-- Los botones se mostrarán según el tipo de usuario y el estado del evento -->
            </div>
        </div>
    </div>

    <!-- Notificación -->
    <div id="notification" class="notification"></div>

    <script>
        // Datos de ejemplo
        let currentUser = {
            id: 1,
            name: "Usuario Ejemplo",
            role: "admin" // "admin" o "student"
        };

        let events = [
            {
                id: 1,
                title: "Conferencia de Tecnología",
                description: "Una conferencia sobre las últimas tendencias tecnológicas",
                date: "2023-10-15",
                time: "10:00",
                duration: 120,
                capacity: 50,
                registered: 35,
                createdBy: 1
            },
            {
                id: 2,
                title: "Taller de Programación",
                description: "Aprende los fundamentos de la programación",
                date: "2023-10-20",
                time: "14:00",
                duration: 90,
                capacity: 20,
                registered: 20,
                createdBy: 1
            },
            {
                id: 3,
                title: "Sesión de Estudio Grupal",
                description: "Reunión para estudiar en grupo para el examen final",
                date: "2023-10-25",
                time: "16:00",
                duration: 180,
                capacity: 15,
                registered: 8,
                createdBy: 1
            }
        ];

        let userRegistrations = [];

        // Elementos del DOM
        const calendarGrid = document.getElementById('calendar-grid');
        const currentMonthElement = document.getElementById('current-month');
        const prevMonthBtn = document.getElementById('prev-month');
        const nextMonthBtn = document.getElementById('next-month');
        const addEventBtn = document.getElementById('add-event-btn');
        const eventModal = document.getElementById('event-modal');
        const eventDetailsModal = document.getElementById('event-details-modal');
        const eventForm = document.getElementById('event-form');
        const closeModalButtons = document.querySelectorAll('.close-modal');
        const notification = document.getElementById('notification');
        const userRoleElement = document.getElementById('user-role');
        const userNameElement = document.getElementById('user-name');
        const adminControls = document.getElementById('admin-controls');
        const logoutBtn = document.getElementById('logout-btn');

        // Variables de estado
        let currentDate = new Date();
        let currentView = 'month';
        let editingEventId = null;

        // Inicialización
        function init() {
            updateUserInterface();
            renderCalendar();
            setupEventListeners();
        }

        // Actualizar interfaz según el tipo de usuario
        function updateUserInterface() {
            userNameElement.textContent = currentUser.name;
            userRoleElement.textContent = currentUser.role === 'admin' ? 'Administrador' : 'Estudiante';
            
            if (currentUser.role === 'admin') {
                adminControls.style.display = 'flex';
            } else {
                adminControls.style.display = 'none';
            }
        }

        // Configurar event listeners
        function setupEventListeners() {
            prevMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });

            nextMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });

            addEventBtn.addEventListener('click', openAddEventModal);

            eventForm.addEventListener('submit', saveEvent);

            closeModalButtons.forEach(button => {
                button.addEventListener('click', closeModals);
            });

            // Cerrar modal al hacer clic fuera
            window.addEventListener('click', (e) => {
                if (e.target === eventModal) {
                    closeModals();
                }
                if (e.target === eventDetailsModal) {
                    closeModals();
                }
            });

            // Cambiar vista del calendario
            document.querySelectorAll('.calendar-view-options button').forEach(button => {
                button.addEventListener('click', (e) => {
                    document.querySelectorAll('.calendar-view-options button').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    currentView = e.target.dataset.view;
                    renderCalendar();
                });
            });

            logoutBtn.addEventListener('click', toggleUserRole);
        }

        // Alternar entre administrador y estudiante (para demostración)
        function toggleUserRole() {
            if (currentUser.role === 'admin') {
                currentUser.role = 'student';
            } else {
                currentUser.role = 'admin';
            }
            updateUserInterface();
            renderCalendar();
            showNotification('Tipo de usuario cambiado', 'success');
        }

        // Renderizar calendario
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            currentMonthElement.textContent = `${getMonthName(month)} ${year}`;
            
            // Limpiar calendario
            calendarGrid.innerHTML = '';
            
            // Agregar encabezados de días
            const daysOfWeek = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            daysOfWeek.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'calendar-day-header';
                dayHeader.textContent = day;
                calendarGrid.appendChild(dayHeader);
            });
            
            // Obtener primer día del mes y último día del mes
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            
            // Obtener día de la semana del primer día (0 = Domingo, 6 = Sábado)
            const firstDayOfWeek = firstDay.getDay();
            
            // Obtener último día del mes anterior
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            
            // Agregar días del mes anterior
            for (let i = firstDayOfWeek - 1; i >= 0; i--) {
                const dayElement = createDayElement(prevMonthLastDay - i, true);
                calendarGrid.appendChild(dayElement);
            }
            
            // Agregar días del mes actual
            for (let i = 1; i <= lastDay.getDate(); i++) {
                const dayElement = createDayElement(i, false);
                calendarGrid.appendChild(dayElement);
            }
            
            // Agregar días del próximo mes para completar la cuadrícula
            const totalCells = 42; // 6 filas * 7 columnas
            const remainingCells = totalCells - (firstDayOfWeek + lastDay.getDate());
            
            for (let i = 1; i <= remainingCells; i++) {
                const dayElement = createDayElement(i, true);
                calendarGrid.appendChild(dayElement);
            }
        }

        // Crear elemento de día
        function createDayElement(dayNumber, isOtherMonth) {
            const dayElement = document.createElement('div');
            dayElement.className = `calendar-day ${isOtherMonth ? 'other-month' : ''}`;
            
            const dayNumberElement = document.createElement('div');
            dayNumberElement.className = 'day-number';
            dayNumberElement.textContent = dayNumber;
            dayElement.appendChild(dayNumberElement);
            
            // Obtener fecha completa para este día
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const date = new Date(year, month, dayNumber);
            const dateString = formatDate(date);
            
            // Mostrar eventos para este día
            const dayEvents = events.filter(event => event.date === dateString);
            dayEvents.forEach(event => {
                const eventElement = document.createElement('div');
                eventElement.className = 'event';
                
                // Verificar si el usuario está registrado en este evento
                const isRegistered = userRegistrations.includes(event.id);
                if (isRegistered) {
                    eventElement.classList.add('registered');
                }
                
                // Verificar si el evento está lleno
                if (event.registered >= event.capacity) {
                    eventElement.classList.add('full');
                }
                
                eventElement.textContent = `${event.time} - ${event.title}`;
                eventElement.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showEventDetails(event.id);
                });
                
                dayElement.appendChild(eventElement);
            });
            
            // Si es el mes actual, permitir agregar eventos (administradores)
            if (!isOtherMonth && currentUser.role === 'admin') {
                dayElement.addEventListener('click', () => {
                    openAddEventModalForDate(dateString);
                });
            }
            
            return dayElement;
        }

        // Abrir modal para agregar evento
        function openAddEventModal() {
            editingEventId = null;
            document.getElementById('modal-title').textContent = 'Agregar Evento';
            document.getElementById('save-event-btn').textContent = 'Guardar Evento';
            eventForm.reset();
            
            // Establecer fecha mínima como hoy
            const today = new Date();
            document.getElementById('event-date').min = formatDate(today);
            
            eventModal.style.display = 'flex';
        }

        // Abrir modal para agregar evento en una fecha específica
        function openAddEventModalForDate(dateString) {
            openAddEventModal();
            document.getElementById('event-date').value = dateString;
        }

        // Cerrar modales
        function closeModals() {
            eventModal.style.display = 'none';
            eventDetailsModal.style.display = 'none';
        }

        // Guardar evento
        function saveEvent(e) {
            e.preventDefault();
            
            const title = document.getElementById('event-title').value;
            const description = document.getElementById('event-description').value;
            const date = document.getElementById('event-date').value;
            const time = document.getElementById('event-time').value;
            const duration = parseInt(document.getElementById('event-duration').value);
            const capacity = parseInt(document.getElementById('event-capacity').value);
            
            if (editingEventId) {
                // Editar evento existente
                const eventIndex = events.findIndex(event => event.id === editingEventId);
                if (eventIndex !== -1) {
                    events[eventIndex] = {
                        ...events[eventIndex],
                        title,
                        description,
                        date,
                        time,
                        duration,
                        capacity
                    };
                    showNotification('Evento actualizado correctamente', 'success');
                }
            } else {
                // Crear un nuevo evento
                const newEvent = {
                    id: Date.now(), // ID simple 
                    title,
                    description,
                    date,
                    time,
                    duration,
                    capacity,
                    registered: 0,
                    createdBy: currentUser.id
                };
                events.push(newEvent);
                showNotification('Evento creado correctamente', 'success');
            }
            
            closeModals();
            renderCalendar();
        }

        // Mostrar detalles del evento
        function showEventDetails(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            document.getElementById('event-details-title').textContent = event.title;
            document.getElementById('event-details-description').textContent = event.description;
            document.getElementById('event-details-date').textContent = formatDisplayDate(event.date);
            document.getElementById('event-details-time').textContent = event.time;
            document.getElementById('event-details-duration').textContent = event.duration;
            document.getElementById('event-details-capacity').textContent = event.capacity;
            document.getElementById('event-details-registered').textContent = event.registered;
            
            const eventActions = document.getElementById('event-actions');
            eventActions.innerHTML = '';
            
            const isRegistered = userRegistrations.includes(eventId);
            const isFull = event.registered >= event.capacity;
            
            if (currentUser.role === 'admin') {
                // Botones para administrador
                const editButton = document.createElement('button');
                editButton.className = 'btn btn-primary';
                editButton.textContent = 'Editar';
                editButton.addEventListener('click', () => {
                    editEvent(eventId);
                    closeModals();
                });
                
                const deleteButton = document.createElement('button');
                deleteButton.className = 'btn btn-danger';
                deleteButton.textContent = 'Eliminar';
                deleteButton.addEventListener('click', () => {
                    deleteEvent(eventId);
                    closeModals();
                });
                
                eventActions.appendChild(editButton);
                eventActions.appendChild(deleteButton);
            } else {
                // Botones para estudiante
                if (isRegistered) {
                    const cancelButton = document.createElement('button');
                    cancelButton.className = 'btn btn-danger';
                    cancelButton.textContent = 'Cancelar Registro';
                    cancelButton.addEventListener('click', () => {
                        unregisterFromEvent(eventId);
                        closeModals();
                    });
                    eventActions.appendChild(cancelButton);
                } else if (!isFull) {
                    const registerButton = document.createElement('button');
                    registerButton.className = 'btn btn-success';
                    registerButton.textContent = 'Registrarse';
                    registerButton.addEventListener('click', () => {
                        registerForEvent(eventId);
                        closeModals();
                    });
                    eventActions.appendChild(registerButton);
                } else {
                    const fullMessage = document.createElement('p');
                    fullMessage.textContent = 'Evento lleno';
                    fullMessage.style.color = 'var(--danger-color)';
                    eventActions.appendChild(fullMessage);
                }
            }
            
            eventDetailsModal.style.display = 'flex';
        }

        // Editar algun evento
        function editEvent(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            editingEventId = eventId;
            document.getElementById('modal-title').textContent = 'Editar Evento';
            document.getElementById('save-event-btn').textContent = 'Actualizar Evento';
            
            document.getElementById('event-title').value = event.title;
            document.getElementById('event-description').value = event.description;
            document.getElementById('event-date').value = event.date;
            document.getElementById('event-time').value = event.time;
            document.getElementById('event-duration').value = event.duration;
            document.getElementById('event-capacity').value = event.capacity;
            
            eventModal.style.display = 'flex';
        }

        // Eliminar algun evento
        function deleteEvent(eventId) {
            if (confirm('¿Estás seguro de que quieres eliminar este evento?')) {
                events = events.filter(event => event.id !== eventId);
                // eliminar registros de usuarios para un evento
                userRegistrations = userRegistrations.filter(id => id !== eventId);
                showNotification('Evento eliminado correctamente', 'success');
                renderCalendar();
            }
        }

        // Registrarse en un evento
        function registerForEvent(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            if (event.registered < event.capacity) {
                if (!userRegistrations.includes(eventId)) {
                    userRegistrations.push(eventId);
                    event.registered++;
                    showNotification('Te has registrado correctamente al evento', 'success');
                    renderCalendar();
                } else {
                    showNotification('Ya estás registrado en este evento', 'error');
                }
            } else {
                showNotification('El evento está lleno', 'error');
            }
        }

        // Cancelar un evento
        function unregisterFromEvent(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            const registrationIndex = userRegistrations.indexOf(eventId);
            if (registrationIndex !== -1) {
                userRegistrations.splice(registrationIndex, 1);
                event.registered--;
                showNotification('Has cancelado tu registro al evento', 'success');
                renderCalendar();
            }
        }

        // Mostrar una notificación
        function showNotification(message, type) {
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Funciones auxiliares de fechas 
        function getMonthName(monthIndex) {
            const months = [
                'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
            ];
            return months[monthIndex];
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDisplayDate(dateString) {
            const date = new Date(dateString);
            const day = date.getDate();
            const month = getMonthName(date.getMonth());
            const year = date.getFullYear();
            return `${day} de ${month} de ${year}`;
        }

        // Iniciar
        init();
    </script>
</body>
</html>
