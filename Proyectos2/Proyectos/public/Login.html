<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Login_styles.css">
    <title>Login</title>
</head>
<body>
    <div class="conteiner__main">
        <h1 class="name">Eventos CIMA</h1>
        <div class="conteiner">
            <h2 class="title">BIENVENIDOS</h2>
            <form class="formulario">
                <label for="email" class="formulario__label">Correo</label>
                <input type="email" id="email" name="correo" class="formulario_info" placeholder="Example@gmail.com">
                <label for="password" class="formulario__label">Contraseña</label>
                <input type="password" id="password" name="contraseña" class="formulario_info" placeholder="Contraseña">
                <input type="button" value="Ingresar" class="formulario__button">
                <label>Tienes una cuenta? registrate <a class="formulario__link" href="Register.html">aquí</a></label>
            </form>
        </div>
    </div>
</body>
</html>
