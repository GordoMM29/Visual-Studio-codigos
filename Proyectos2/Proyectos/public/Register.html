<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Register_styles.css">
    <title>Registro</title>
</head>
<body>
    <form class="formulario">
        <h1>Registro</h1>
        <label for="nombre" class="formulario__nombre">Nombre</label>
        <input type="text" id="nombre" name="name" class="formulario__info" placeholder="Nombre">
        <label for="email" class="formulario__label">Correo</label>
        <input type="email" id="email" name="correo" class="formulario__info" placeholder="Example@gmail.com">
        <label for="" class="formulario__label">Tipo</label>
        <select name="" id="">
            <option value="Organizador">Organizador</option>
            <option value="Participante">Participante</option>
        </select>
        <label for="password" class="formulario__label">Contraseña</label>        
        <input type="password" id="password" name="contraseña" class="formulario__info" placeholder="Contraseña">
        <input type="button" value="Acceder" class="formulario__button">
    </form>
</body>
</html>
